# =========================
# Topics
# =========================

imu_topic: "/imu0"
feature_topic: "/feature_tracker/feature"
output_path: "/home/ethan/rviz/"

# =========================
# IMU noise parameters
# EuRoC / VINS-Mono 常用量级
# =========================

acc_n: 0.08
gyr_n: 0.004
acc_w: 0.00004
gyr_w: 0.0000002

# =========================
# Gravity
# 注意：我们当前 IntegrationBase / IMUFactor 使用 G
# 第一版沿用 VINS-Mono 默认形式
# =========================

gravity: [0.0, 0.0, 9.8]

# =========================
# Camera-IMU extrinsic
# EuRoC cam0 到 imu0 的外参，第一版固定外参
#
# 这里先用 VINS-Mono EuRoC 常见配置。
# 如果你后面使用的 feature_tracker config 里已有准确外参，
# 要保证这里和 feature_tracker 使用的是同一套外参。
# =========================

tic: [0.05, 0.04, -0.03]

ric: [
  0.0148655429818, -0.999880929698,  0.00414029679422,
  0.999557249008,   0.0149672133247, 0.025715529948,
 -0.0257744366974,  0.00375618835797, 0.999660727178
]

# =========================
# Solver
# =========================

max_solver_time: 0.08
max_num_iterations: 12

# =========================
# Feature / projection
# =========================

min_parallax: 10.0
init_depth: 5.0

# =========================
# Time offset
# 第二版估计 td
# =========================

td: 0.0

estimate_td: 0

rolling_shutter: 0
rolling_shutter_tr: 0.0

image_height: 480
image_width: 752

